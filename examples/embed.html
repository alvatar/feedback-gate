<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>feedback-gate example</title>
  </head>
  <body>
    <button id="feedback-button" type="button">Leave feedback</button>

    <script type="module">
      import { FeedbackGate } from '../dist/index.js';

      new FeedbackGate({
        endpoint: 'https://feedback-gate.YOUR_SUBDOMAIN.workers.dev',
        target: '#feedback-button',
        protection: {
          turnstile: {
            siteKey: 'REPLACE_WITH_TURNSTILE_SITE_KEY',
            action: 'feedback_submit',
          },
        },
        strings: {
          title: 'Product feedback',
          description: 'Short, specific feedback is best.',
          authDescription: "Your identity won't be shared. This is just to avoid spam",
        },
        fields: [
          {
            name: 'type',
            type: 'select',
            label: 'Type',
            required: true,
            placeholder: 'Choose one',
            options: ['bug', 'idea', 'question'],
          },
          {
            name: 'email',
            type: 'email',
            label: 'Reply email',
            placeholder: 'you@example.com',
          },
        ],
      });
    </script>
  </body>
</html>
